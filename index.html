<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daggerheart Adversary Converter</title>
<style>
/* ── Theme tokens ──────────────────────────────────── */
:root {
  --bg-deep: #0d1117;
  --bg-card: #161b22;
  --bg-inset: #1c2333;
  --bg-hover: #21293a;
  --border: #30363d;
  --border-accent: #f0a50044;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --text-muted: #9198a1;
  --accent: #f0a500;
  --accent-glow: #f0a50033;
  --accent-dim: #c48800;
  --danger: #f85149;
  --success: #3fb950;
  --radius: 8px;
  --radius-sm: 5px;
  --shadow: 0 2px 12px #00000040;
  --shadow-lg: 0 8px 32px #00000060;
  --transition: 0.2s ease;
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
  --accent-text: var(--accent);
}

/* ── Reset & base ──────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background: var(--bg-deep);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
  padding: 2rem 1rem 4rem;
}

/* subtle grain overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px;
  pointer-events: none;
  z-index: 9999;
}

/* ── Card shell ────────────────────────────────────── */
.card {
  max-width: 720px;
  margin: 0 auto;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
}

/* ── Header ────────────────────────────────────────── */
.header {
  padding: 2rem 2rem 1.5rem;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, var(--bg-inset), var(--bg-card));
  position: relative;
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 2rem;
  right: 2rem;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}

.header h1 {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.header h1 .dagger {
  color: var(--accent);
  font-size: 1.2em;
}

.header p {
  color: var(--text-dim);
  font-size: 0.875rem;
  margin-top: 0.25rem;
}

/* ── Sections ──────────────────────────────────────── */
.section {
  padding: 1.5rem 2rem;
  border-bottom: 1px solid var(--border);
}

.section:last-child { border-bottom: none; }

.section-label {
  font-size: 0.6875rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent-text);
  margin-bottom: 0.75rem;
}

/* ── Tabs ──────────────────────────────────────────── */
.tabs {
  display: flex;
  gap: 0;
  margin-bottom: 1rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}

.tab {
  flex: 1;
  padding: 0.5rem 1rem;
  font-size: 0.8125rem;
  font-weight: 500;
  text-align: center;
  cursor: pointer;
  background: var(--bg-inset);
  color: var(--text-dim);
  border: none;
  border-right: 1px solid var(--border);
  transition: background var(--transition), color var(--transition);
  font-family: inherit;
}

.tab:last-child { border-right: none; }
.tab:hover { background: var(--bg-hover); color: var(--text); }
.tab.active { background: var(--bg-card); color: var(--accent); font-weight: 600; }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Drop zone ─────────────────────────────────────── */
.dropzone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 2rem;
  text-align: center;
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
  position: relative;
}

.dropzone:hover,
.dropzone.dragover {
  border-color: var(--accent);
  background: var(--accent-glow);
}

.dropzone-icon {
  font-size: 2rem;
  margin-bottom: 0.5rem;
  opacity: 0.5;
}

.dropzone-text {
  font-size: 0.875rem;
  color: var(--text-dim);
}

.dropzone-text strong {
  color: var(--accent);
  cursor: pointer;
}

.dropzone-file {
  margin-top: 0.75rem;
  font-size: 0.8125rem;
  color: var(--accent);
  font-weight: 500;
}

.dropzone input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}

/* ── Source list ────────────────────────────────────── */
.source-list {
  display: flex;
  flex-direction: column;
  gap: 0.375rem;
}

.source-item {
  display: flex;
  align-items: center;
  gap: 0.625rem;
  padding: 0.5rem 0.75rem;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background var(--transition);
  font-size: 0.875rem;
}

.source-item:hover { background: var(--bg-hover); }
.source-item.disabled { opacity: 0.4; cursor: not-allowed; }
.source-item.disabled:hover { background: transparent; }

.source-item input[type="radio"] {
  accent-color: var(--accent);
  margin: 0;
}

.source-item .badge {
  font-size: 0.625rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 0.125rem 0.375rem;
  border-radius: 3px;
  font-weight: 600;
  background: var(--bg-inset);
  color: var(--text-muted);
  border: 1px solid var(--border);
}

.source-note {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 0.5rem;
  font-style: italic;
}

/* ── Form controls ─────────────────────────────────── */
.field {
  margin-bottom: 0.75rem;
}

.field:last-child { margin-bottom: 0; }

.field label {
  display: block;
  font-size: 0.8125rem;
  font-weight: 500;
  margin-bottom: 0.25rem;
  color: var(--text-dim);
}

.field input[type="text"] {
  width: 100%;
  padding: 0.5rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg-inset);
  color: var(--text);
  font-size: 0.875rem;
  font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  transition: border-color var(--transition);
  outline: none;
}

.field input[type="text"]:focus {
  border-color: var(--accent);
}

.checkgroup {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
}

.check-item {
  display: flex;
  align-items: center;
  gap: 0.375rem;
  font-size: 0.8125rem;
  cursor: pointer;
}

.check-item input[type="checkbox"] {
  accent-color: var(--accent);
}

/* ── Buttons ───────────────────────────────────────── */
.actions {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.625rem 1.25rem;
  border-radius: var(--radius-sm);
  font-size: 0.875rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all var(--transition);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-primary {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}

.btn-primary:hover:not(:disabled) {
  background: var(--accent-dim);
  border-color: var(--accent-dim);
}

.btn-secondary {
  background: transparent;
  color: var(--text-dim);
  border-color: var(--border);
}

.btn-secondary:hover:not(:disabled) {
  background: var(--bg-hover);
  color: var(--text);
  border-color: var(--text-muted);
}

/* ── Spinner ───────────────────────────────────────── */
.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid transparent;
  border-top-color: currentColor;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── Results ───────────────────────────────────────── */
.results {
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

.result-summary {
  font-size: 0.9375rem;
  font-weight: 500;
  margin-bottom: 0.75rem;
  padding: 0.75rem 1rem;
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--success);
  background: var(--bg-inset);
}

.result-summary.error {
  border-left-color: var(--danger);
  color: var(--danger);
}

.result-details {
  margin-top: 0.5rem;
}

.result-details details {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 0.5rem;
  overflow: hidden;
}

.result-details summary {
  padding: 0.5rem 0.75rem;
  font-size: 0.8125rem;
  font-weight: 500;
  cursor: pointer;
  background: var(--bg-inset);
  color: var(--text-dim);
  transition: background var(--transition);
  list-style: none;
}

.result-details summary::-webkit-details-marker { display: none; }

.result-details summary::before {
  content: '▸ ';
  color: var(--text-muted);
}

.result-details details[open] summary::before {
  content: '▾ ';
}

.result-details summary:hover {
  background: var(--bg-hover);
}

.result-details .detail-body {
  padding: 0.5rem 0.75rem;
  font-size: 0.8125rem;
  max-height: 240px;
  overflow-y: auto;
}

.result-details .detail-body ul {
  list-style: none;
  padding: 0;
}

.result-details .detail-body li {
  padding: 0.125rem 0;
  color: var(--text-dim);
  font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  font-size: 0.75rem;
}

.warning-group {
  margin-bottom: 0.5rem;
}

.warning-name {
  font-weight: 600;
  color: var(--text);
  font-family: inherit;
  font-size: 0.8125rem;
}

.warning-issue {
  color: var(--text-muted);
  padding-left: 1rem;
}

/* ── Skip link ─────────────────────────────────────── */
.skip-link {
  position: absolute;
  top: -40px;
  left: 0;
  background: var(--accent);
  color: #000;
  padding: 0.5rem 1rem;
  z-index: 10000;
  font-weight: 600;
  text-decoration: none;
  border-radius: 0 0 var(--radius-sm) 0;
}

.skip-link:focus {
  top: 0;
}

/* ── Focus indicators (WCAG 2.4.7) ────────────────── */
.btn:focus-visible,
.tab:focus-visible,
.dropzone:focus-visible,
.field input:focus-visible,
.check-item input:focus-visible,
.source-item input:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* ── Inline errors ────────────────────────────────── */
.inline-error {
  font-size: 0.875rem;
  font-weight: 500;
  padding: 0.75rem 1rem;
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--danger);
  background: var(--bg-inset);
  color: var(--danger);
  margin-top: 0.75rem;
}

/* ── Utilities ─────────────────────────────────────── */
.hidden { display: none !important; }

.mt { margin-top: 0.75rem; }

/* ── Responsive ────────────────────────────────────── */
@media (max-width: 520px) {
  body { padding: 1rem 0.5rem 3rem; }
  .section { padding: 1.25rem 1.25rem; }
  .header { padding: 1.5rem 1.25rem 1.25rem; }
  .header h1 { font-size: 1.25rem; }
  .checkgroup { gap: 0.75rem; }
}
</style>
</head>
<body>

<a class="skip-link" href="#btn-convert">Skip to convert</a>

<main>
<div class="card">

  <!-- ── Header ──────────────────────────────────── -->
  <header class="header">
    <h1><span class="dagger" aria-hidden="true">⚔</span> Daggerheart Adversary Converter</h1>
    <p>Convert TTRPG stat blocks</p>
  </header>

  <!-- ── Source selection ────────────────────────── -->
  <div class="section">
    <h2 class="section-label">Source</h2>

    <div class="tabs" role="tablist">
      <button class="tab active" data-tab="upload" role="tab" id="tab-upload" aria-selected="true" aria-controls="panel-upload">Upload File</button>
      <button class="tab" data-tab="existing" role="tab" id="tab-existing" aria-selected="false" aria-controls="panel-existing">Existing Sources</button>
    </div>

    <div id="panel-upload" class="tab-panel active" role="tabpanel" aria-labelledby="tab-upload">
      <div class="dropzone" id="dropzone" role="button" tabindex="0" aria-label="Drop a file here or click to browse">
        <div class="dropzone-icon" aria-hidden="true">📄</div>
        <div class="dropzone-text">Drop a <strong>.pdf</strong> or <strong>.md</strong> file here, or <strong>click to browse</strong></div>
        <div class="dropzone-file hidden" id="file-name"></div>
        <input type="file" id="file-input" accept=".pdf,.md" aria-label="Upload a PDF or Markdown file">
      </div>
    </div>

    <div id="panel-existing" class="tab-panel" role="tabpanel" aria-labelledby="tab-existing">
      <div class="source-list" id="source-list">
        <div class="source-note">Loading sources…</div>
      </div>
    </div>
  </div>

  <!-- ── Options ─────────────────────────────────── -->
  <div class="section">
    <h2 class="section-label">Options</h2>

    <div class="field">
      <label for="output-dir">Output directory</label>
      <input type="text" id="output-dir" value="output/web-convert">
    </div>

    <fieldset class="field" style="border:none;padding:0;margin:0 0 0.75rem">
      <legend style="font-size:0.8125rem;font-weight:500;margin-bottom:0.25rem;color:var(--text-dim)">Format</legend>
      <div class="checkgroup">
        <label class="check-item"><input type="checkbox" id="opt-markdown" checked> Markdown files</label>
        <label class="check-item"><input type="checkbox" id="opt-beastvault"> BeastVault JSON</label>
        <label class="check-item"><input type="checkbox" id="opt-index"> Master Index</label>
      </div>
    </fieldset>

    <div class="field">
      <div class="checkgroup">
        <label class="check-item"><input type="checkbox" id="opt-overwrite"> Overwrite existing files</label>
      </div>
    </div>
  </div>

  <!-- ── Inline error ──────────────────────────────── -->
  <div class="section hidden" id="inline-error-section">
    <div class="inline-error" id="inline-error" role="alert"></div>
  </div>

  <!-- ── Actions ─────────────────────────────────── -->
  <div class="section">
    <div class="actions">
      <button class="btn btn-primary" id="btn-convert">Convert</button>
    </div>
  </div>

  <!-- ── Results ─────────────────────────────────── -->
  <div class="section hidden" id="results-section">
    <h2 class="section-label">Results</h2>
    <div id="results" class="results" aria-live="polite"></div>
  </div>

</div>
</main>

<script>
/* ── State ──────────────────────────────────────────── */
let selectedFile = null;
let selectedSource = null;
let sourcesData = [];

/* ── DOM refs ───────────────────────────────────────── */
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

const dropzone = $('#dropzone');
const fileInput = $('#file-input');
const fileName = $('#file-name');
const sourceList = $('#source-list');
const btnConvert = $('#btn-convert');
const resultsSection = $('#results-section');
const resultsDiv = $('#results');

/* ── Tabs ───────────────────────────────────────────── */
const tabs = Array.from($$('.tab'));
function activateTab(tab) {
  tabs.forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected', 'false'); t.setAttribute('tabindex', '-1'); });
  $$('.tab-panel').forEach(p => p.classList.remove('active'));
  tab.classList.add('active');
  tab.setAttribute('aria-selected', 'true');
  tab.setAttribute('tabindex', '0');
  $(`#panel-${tab.dataset.tab}`).classList.add('active');
  tab.focus();
}
tabs.forEach(tab => {
  tab.addEventListener('click', () => activateTab(tab));
  tab.addEventListener('keydown', (e) => {
    const idx = tabs.indexOf(tab);
    if (e.key === 'ArrowRight') { e.preventDefault(); activateTab(tabs[(idx + 1) % tabs.length]); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); activateTab(tabs[(idx - 1 + tabs.length) % tabs.length]); }
  });
});
// Set initial tabindex state
tabs.forEach(t => t.setAttribute('tabindex', t.classList.contains('active') ? '0' : '-1'));

/* ── Drag & drop ────────────────────────────────────── */
dropzone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropzone.classList.add('dragover');
});

dropzone.addEventListener('dragleave', () => {
  dropzone.classList.remove('dragover');
});

dropzone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  const files = e.dataTransfer.files;
  if (files.length > 0) setFile(files[0]);
});

fileInput.addEventListener('change', () => {
  if (fileInput.files.length > 0) setFile(fileInput.files[0]);
});

dropzone.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    fileInput.click();
  }
});

function setFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext !== 'pdf' && ext !== 'md') {
    showInlineError('Unsupported file type. Please select a .pdf or .md file.');
    return;
  }
  selectedFile = file;
  selectedSource = null;
  $$('input[name="source"]').forEach(r => r.checked = false);
  fileName.textContent = file.name;
  fileName.classList.remove('hidden');
}

/* ── Load existing sources ──────────────────────────── */
async function loadSources() {
  try {
    const res = await fetch('/api/sources');
    const data = await res.json();
    sourcesData = data.sources || [];
    renderSources(data);
  } catch (e) {
    sourceList.innerHTML = '<div class="source-note">Could not load sources.</div>';
  }
}

function renderSources(data) {
  if (!data.sources || data.sources.length === 0) {
    sourceList.innerHTML = '<div class="source-note">No source files found in sources/ directory.</div>';
    return;
  }

  let html = '';
  for (const src of data.sources) {
    const disabled = !src.enabled;
    const cls = disabled ? 'source-item disabled' : 'source-item';
    const disabledAttr = disabled ? 'disabled' : '';
    html += `<label class="${cls}">
      <input type="radio" name="source" value="${src.filename}" ${disabledAttr}>
      <span>${src.display_name}</span>
      <span class="badge">${src.type}</span>
    </label>`;
  }

  if (!data.pdfplumber_available) {
    html += '<div class="source-note">PDF sources are disabled — pdfplumber is not installed.</div>';
  }

  sourceList.innerHTML = html;

  $$('input[name="source"]').forEach(radio => {
    radio.addEventListener('change', () => {
      selectedSource = radio.value;
      selectedFile = null;
      fileInput.value = '';
      fileName.classList.add('hidden');
    });
  });
}

loadSources();

/* ── Convert ────────────────────────────────────────── */
btnConvert.addEventListener('click', async () => {
  if (!selectedFile && !selectedSource) {
    showInlineError('Please select or upload a source file first.');
    return;
  }

  btnConvert.disabled = true;
  btnConvert.innerHTML = '<span class="spinner"></span> Converting…';
  resultsSection.classList.remove('hidden');
  resultsDiv.innerHTML = '';

  try {
    let res;
    if (selectedFile) {
      const form = new FormData();
      form.append('file', selectedFile);
      form.append('output_dir', $('#output-dir').value);
      form.append('markdown', $('#opt-markdown').checked);
      form.append('beastvault', $('#opt-beastvault').checked);
      form.append('index', $('#opt-index').checked);
      form.append('overwrite', $('#opt-overwrite').checked);
      res = await fetch('/api/convert', { method: 'POST', body: form });
    } else {
      res = await fetch('/api/convert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          source: selectedSource,
          output_dir: $('#output-dir').value,
          markdown: $('#opt-markdown').checked,
          beastvault: $('#opt-beastvault').checked,
          index: $('#opt-index').checked,
          overwrite: $('#opt-overwrite').checked,
        }),
      });
    }

    const data = await res.json();
    if (!res.ok) {
      renderConvertResults({ success: false, error: data.error || `Server error (${res.status})` });
    } else {
      renderConvertResults(data);
    }
  } catch (e) {
    resultsDiv.innerHTML = `<div class="result-summary error">Request failed: ${esc(e.message)}</div>`;
  } finally {
    btnConvert.disabled = false;
    btnConvert.innerHTML = 'Convert';
  }
});

function renderConvertResults(data) {
  let html = '<div class="results">';

  if (data.success) {
    html += `<div class="result-summary">${esc(data.summary)}</div>`;
    html += '<div class="result-details">';

    if (data.files_written && data.files_written.length > 0) {
      html += `<details><summary>${data.files_written.length} files written</summary><div class="detail-body"><ul>`;
      for (const f of data.files_written) html += `<li>${esc(f)}</li>`;
      html += '</ul></div></details>';
    }

    if (data.beastvault_file) {
      html += `<details><summary>BeastVault JSON</summary><div class="detail-body"><ul><li>${esc(data.beastvault_file)}</li></ul></div></details>`;
    }

    if (data.validation_warnings && data.validation_warnings.length > 0) {
      html += `<details><summary>${data.validation_warnings.length} validation warnings</summary><div class="detail-body">`;
      for (const w of data.validation_warnings) {
        html += `<div class="warning-group"><div class="warning-name">${esc(w.name)}</div>`;
        for (const issue of w.issues) html += `<div class="warning-issue">— ${esc(issue)}</div>`;
        html += '</div>';
      }
      html += '</div></details>';
    }

    html += '</div>';
  } else {
    html += `<div class="result-summary error">${esc(data.error || 'Unknown error')}</div>`;
  }

  html += '</div>';
  resultsDiv.innerHTML = html;
}

/* ── Inline error helper ────────────────────────────── */
function showInlineError(msg) {
  const section = $('#inline-error-section');
  const el = $('#inline-error');
  el.textContent = msg;
  section.classList.remove('hidden');
  setTimeout(() => section.classList.add('hidden'), 5000);
}

/* ── Util ───────────────────────────────────────────── */
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
